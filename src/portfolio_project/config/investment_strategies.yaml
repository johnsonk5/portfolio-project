strategies:
  - strategy_id: benchmark_spy_buy_and_hold
    strategy_name: Buy And Hold SPY
    strategy_version: v1
    description: Benchmark strategy that continuously holds SPY with a single-position portfolio.
    ranking_method: single_asset_hold
    rebalance_frequency: Monthly
    target_count: 1
    weighting_method: equal
    benchmark_symbol: SPY
    long_short_flag: false
    start_date: 2000-01-01
    end_date:
    is_active: true
    config:
      universe: benchmark_only
      selection_mode: fixed_symbol
      rebalance_anchor: month_end
    parameters:
      - parameter_name: symbol
        parameter_value: SPY
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: ETF symbol held by the benchmark strategy.
      - parameter_name: rebalance_buffer_bps
        parameter_value: "0"
        parameter_type: int
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Zero turnover buffer for the static benchmark portfolio.

  - strategy_id: momentum_top_10
    strategy_name: Momentum Top 10
    strategy_version: v1
    description: Long-only strategy that buys the top 10 securities by 12-1 momentum each month.
    ranking_method: momentum_12_1_desc
    rebalance_frequency: Monthly
    target_count: 10
    weighting_method: equal
    benchmark_symbol: SPY
    long_short_flag: false
    start_date: 2000-01-01
    end_date:
    is_active: true
    config:
      universe: universe_membership_daily
      selection_mode: top_n
      rebalance_anchor: month_end
    parameters:
      - parameter_name: signal_column
        parameter_value: momentum_12_1
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Signal column used for ranking.
      - parameter_name: ranking_direction
        parameter_value: desc
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Higher momentum values rank first.
      - parameter_name: min_avg_dollar_volume_21d
        parameter_value: "1000000"
        parameter_type: int
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Minimum liquidity threshold for eligible symbols.

  - strategy_id: low_volatility_top_10
    strategy_name: Low Volatility Top 10
    strategy_version: v1
    description: Long-only strategy that selects the 10 lowest-volatility names in the daily universe.
    ranking_method: realized_vol_21d_asc
    rebalance_frequency: Monthly
    target_count: 10
    weighting_method: equal
    benchmark_symbol: SPY
    long_short_flag: false
    start_date: 2000-01-01
    end_date:
    is_active: true
    config:
      universe: universe_membership_daily
      selection_mode: top_n
      rebalance_anchor: month_end
    parameters:
      - parameter_name: signal_column
        parameter_value: realized_vol_21d
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Volatility metric used for ranking.
      - parameter_name: ranking_direction
        parameter_value: asc
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Lower volatility values rank first.
      - parameter_name: min_price_to_sma_200
        parameter_value: "0.9"
        parameter_type: double
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Optional trend floor to avoid deep downtrends.

  - strategy_id: short_term_reversal_top_10
    strategy_name: Short-Term Reversal Top 10
    strategy_version: v1
    description: Long-only strategy that buys the 10 weakest recent performers on a monthly rebalance.
    ranking_method: returns_5d_asc
    rebalance_frequency: Monthly
    target_count: 10
    weighting_method: equal
    benchmark_symbol: SPY
    long_short_flag: false
    start_date: 2000-01-01
    end_date:
    is_active: true
    config:
      universe: universe_membership_daily
      selection_mode: top_n
      rebalance_anchor: month_end
    parameters:
      - parameter_name: signal_column
        parameter_value: returns_5d
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Short-horizon return field used for reversal ranking.
      - parameter_name: ranking_direction
        parameter_value: asc
        parameter_type: string
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Lower trailing returns rank first for mean reversion.
      - parameter_name: min_avg_dollar_volume_21d
        parameter_value: "1000000"
        parameter_type: int
        effective_start_date: 2000-01-01
        effective_end_date:
        is_active: true
        description: Minimum liquidity threshold for eligible symbols.
