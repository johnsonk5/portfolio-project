strategies:
- strategy_id: benchmark_spy_buy_and_hold
  strategy_name: Buy And Hold SPY
  strategy_version: v1
  description: Benchmark strategy that continuously holds SPY with a single-position
    portfolio.
  ranking_method: single_asset_hold
  rebalance_frequency: Monthly
  target_count: 1
  weighting_method: equal
  benchmark_symbol: SPY
  long_short_flag: false
  start_date: 2000-01-01
  end_date: null
  is_active: true
  config:
    universe: benchmark_only
    selection_mode: fixed_symbol
    rebalance_anchor: month_end
  parameters:
  - parameter_name: symbol
    parameter_value: SPY
    parameter_type: string
    effective_start_date: 2000-01-01
    effective_end_date: null
    is_active: true
    description: ETF symbol held by the benchmark strategy.
  - parameter_name: rebalance_buffer_bps
    parameter_value: '0'
    parameter_type: int
    effective_start_date: 2000-01-01
    effective_end_date: null
    is_active: true
    description: Zero turnover buffer for the static benchmark portfolio.
- strategy_id: momentum_top_200
  strategy_name: Momentum Top 200
  strategy_version: v1
  description: Long-only strategy that buys the top 200 securities by 12-1 momentum
    each month.
  ranking_method: momentum_12_1_desc
  rebalance_frequency: Monthly
  target_count: 200
  weighting_method: equal
  benchmark_symbol: SPY
  long_short_flag: false
  start_date: 2000-01-01
  end_date: null
  is_active: true
